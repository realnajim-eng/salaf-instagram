name: Daily Salaf Post

on:
  schedule:
    - cron: "0 15 * * *"   # chaque jour à 15h00 UTC = 17h Paris (été/CEST ; 16h Paris en hiver/CET)
  workflow_dispatch:        # déclenchement manuel depuis GitHub

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate caption (Claude API)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_caption.py

      - name: Generate image & post to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}   # optionnel : PAT pour persister le token Instagram renouvelé
        run: python post_salaf.py

      - name: Commit tracker update
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add tracker.json
          git diff --staged --quiet || git commit -m "Update tracker"
          git push
