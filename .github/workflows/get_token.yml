name: Get Instagram Token
on:
  workflow_dispatch:
    inputs:
      short_token:
        description: Short-lived Instagram token
        required: true
jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange for long-lived token
        env:
          SHORT: ${{ github.event.inputs.short_token }}
          CLIENT_SECRET: ${{ secrets.INSTAGRAM_CLIENT_SECRET }}
        run: |
          echo "SHORT received OK"
          LONG=$(curl -s "https://graph.instagram.com/access_token?grant_type=ig_exchange_token&client_secret=$CLIENT_SECRET&access_token=$SHORT")
          echo "LONG_RESP=$LONG"
