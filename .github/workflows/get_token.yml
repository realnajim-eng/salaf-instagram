name: Get Instagram Token
on:
  workflow_dispatch:
    inputs:
      short_token:
        description: Short-lived Instagram token
        required: true
jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange for long-lived token
        run: |
          SHORT="${{ github.event.inputs.short_token }}"
          echo "SHORT received OK"
          LONG=$(curl -s "https://graph.instagram.com/access_token?grant_type=ig_exchange_token&client_secret=35a53c41bc821a97c45ce7f10714c69f&access_token=$SHORT")
          echo "LONG_RESP=$LONG"
