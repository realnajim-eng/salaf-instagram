name: Get Instagram Token
on:
  workflow_dispatch:
      inputs:
            code:
                    description: 'OAuth code'
                            required: true
                            jobs:
                              get-token:
                                  runs-on: ubuntu-latest
                                      steps:
                                            - name: Exchange code for token
                                                    run: |
                                                              RESPONSE=$(curl -s -X POST https://api.instagram.com/oauth/access_token \
                                                                          -F client_id=1488332789082173 \
                                                                                      -F client_secret=REDACTED \
                                                                                                  -F grant_type=authorization_code \
                                                                                                              -F redirect_uri=https://developers.facebook.com/instagram/token_generator/oauth/ \
                                                                                                                          -F code=${{ github.event.inputs.code }})
                                                                                                                                    echo "Short token response: $RESPONSE"
                                                                                                                                              SHORT_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token','ERROR'))")
                                                                                                                                                        echo "Short token: $SHORT_TOKEN"
                                                                                                                                                                  LONG_RESPONSE=$(curl -s "https://graph.facebook.com/v19.0/oauth/access_token?grant_type=ig_exchange_token&client_secret=REDACTED&access_token=$SHORT_TOKEN")
                                                                                                                                                                            echo "Long token response: $LONG_RESPONSE"
